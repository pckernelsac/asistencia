{% extends "base.html" %}
{% block title %}404 · No encontrada{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="max-w-md w-full text-center">
    <div class="card p-8">
      <p class="text-6xl font-extrabold text-p-700 mb-2">404</p>
      <h2 class="text-lg font-bold text-gray-900 mb-2">Pagina no encontrada</h2>
      <p class="text-sm text-gray-500 mb-6">La pagina que buscas no existe o ha sido movida.</p>

      <div class="flex flex-col sm:flex-row gap-2 justify-center">
        <a href="{{ url_for('dashboard') }}" class="px-5 py-2.5 rounded-lg text-sm font-semibold text-white bg-p-700 hover:bg-p-600 transition-colors inline-flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
          Ir al Dashboard
        </a>
        <button onclick="history.back()" class="px-5 py-2.5 rounded-lg text-sm font-medium border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors inline-flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Volver atras
        </button>
      </div>
    </div>

    <div class="mt-5 grid grid-cols-3 gap-3">
      <a href="{{ url_for('scan') }}" class="card p-3 text-center hover:shadow-md transition-shadow group">
        <svg class="w-6 h-6 mx-auto mb-1.5 text-p-700 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
        <p class="text-xs font-medium text-gray-600">Escanear</p>
      </a>
      <a href="{{ url_for('students') }}" class="card p-3 text-center hover:shadow-md transition-shadow group">
        <svg class="w-6 h-6 mx-auto mb-1.5 text-p-700 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
        <p class="text-xs font-medium text-gray-600">Estudiantes</p>
      </a>
      <a href="{{ url_for('reports') }}" class="card p-3 text-center hover:shadow-md transition-shadow group">
        <svg class="w-6 h-6 mx-auto mb-1.5 text-p-700 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
        <p class="text-xs font-medium text-gray-600">Reportes</p>
      </a>
    </div>
  </div>
</div>
{% endblock %}
